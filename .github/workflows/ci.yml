name: CI

on:
  push:
    branches:
      - main
      - deploy/prod
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Workspace packages must be compiled to dist/ before root tsc can
      # resolve `@soma/*` imports (each package.json points main/types at
      # ./dist/...). The Type Check step below relies on these via the
      # workspace symlinks under node_modules/@soma/*.
      - name: Build workspace packages
        run: |
          npm run build:somalib
          npm run build:packages

      - name: Format & Lint (Biome)
        run: npm run check

      - name: Type Check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
