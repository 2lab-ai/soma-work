name: Deploy (oudwood-512)

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-oudwood-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: [self-hosted, oudwood-512]
    timeout-minutes: 10
    environment: development

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Version bump & release notes
        run: ./scripts/version-bump.sh dev

      - name: Deploy
        env:
          TARGET: /opt/soma-work/dev
        run: |
          echo "Deploying to $TARGET..."

          # Stop service
          ./service.sh dev stop || true

          # Sync built artifacts to deployment target (preserve local configs and data)
          rsync -a --delete \
            --exclude='.env' \
            --exclude='.system.prompt' \
            --exclude='mcp-servers.json' \
            --exclude='config.json' \
            --exclude='data/' \
            --exclude='logs/' \
            --exclude='.claude/' \
            dist/ "$TARGET/dist/"

          rsync -a --delete node_modules/ "$TARGET/node_modules/"
          rsync -a \
            package.json \
            service.sh \
            "$TARGET/"

          # Reinstall service (regenerate plist + start)
          ./service.sh dev install

      - name: Verify
        run: |
          sleep 3
          ./service.sh dev status
