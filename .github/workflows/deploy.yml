name: Deploy

on:
  push:
    branches: [deploy/dev, deploy/prod]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment'
        required: true
        type: string

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [self-hosted, oudwood-512]
    timeout-minutes: 15
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}

    steps:
      - name: Validate manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ inputs.confirm }}" != "deploy" ]]; then
            echo "::error::Confirmation required. Pass confirm='deploy' to proceed."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine deployment target
        id: target
        run: |
          case "${{ github.ref_name }}" in
            main|deploy/dev)
              echo "deploy_env=dev" >> "$GITHUB_OUTPUT"
              ;;
            deploy/prod)
              echo "deploy_env=main" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${{ github.ref_name }}"
              exit 1
              ;;
          esac

      - name: Build target matrix
        id: targets
        run: |
          echo 'matrix<<EOF' >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "deploy/dev" ]]; then
            cat >> "$GITHUB_OUTPUT" <<'EOF'
          {"include":[
            {
              "name":"iq-m16-dev",
              "runner_label":"iq-m16",
              "github_env":"development",
              "deploy_env":"dev",
              "target_dir":"/opt/soma-work/dev"
            },
            {
              "name":"oudwood-dev",
              "runner_label":"oudwood-512",
              "github_env":"development",
              "deploy_env":"dev",
              "target_dir":"/opt/soma-work/dev"
            },
            {
              "name":"iq-m64-dev",
              "runner_label":"iq-m64",
              "github_env":"development",
              "deploy_env":"dev",
              "target_dir":"/opt/soma-work/dev"
            }
          ]}
          EOF
          else
            cat >> "$GITHUB_OUTPUT" <<'EOF'
          {"include":[
            {
              "name":"iq-m16-main",
              "runner_label":"iq-m16",
              "github_env":"production",
              "deploy_env":"main",
              "target_dir":"/opt/soma-work/main"
            }
          ]}
          EOF
          fi

          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke MCP bin package exports
        run: npm run smoke:mcp-bins

      - name: Smoke package assets
        run: npm run smoke:assets

      - name: Configure git identity
        run: |
          git config user.email "z@2lab.ai"
          git config user.name "Z"

      - name: Version bump & release notes
        run: |
          REF="${{ github.ref_name }}"
          # Normalize deploy branch names to their target refs
          case "$REF" in
            deploy/dev) REF="main" ;;
            deploy/prod) REF="deploy/prod" ;;
          esac
          ./scripts/version-bump.sh "$REF"

      - name: Stage deploy bundle
        run: bash scripts/deploy/stage-bundle.sh

      - name: Smoke deploy bundle
        run: npm run smoke:deploy-bundle

      - name: Pack deploy bundle
        run: tar -czf deploy-bundle.tar.gz -C .deploy-bundle .

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: deploy-bundle.tar.gz

  deploy:
    name: Deploy ${{ matrix.name }}
    needs: prepare
    runs-on: [self-hosted, "${{ matrix.runner_label }}"]
    timeout-minutes: 10
    environment: ${{ matrix.github_env }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: bundle

      - name: Extract deploy bundle
        run: |
          # Self-hosted runners keep their _work tree between jobs, so a stale
          # bundle/root from an EARLIER deploy survives here. tar extracts on
          # top without removing files that no longer exist in the new bundle,
          # so a deleted workspace (e.g. the dead packages/extensions asset
          # mirror) lingered in bundle/root and was then rsynced back onto the
          # target — breaking `npm ci` with "Missing: @soma/extensions from
          # lock file". Always extract into a clean directory.
          rm -rf bundle/root
          mkdir -p bundle/root
          tar -xzf bundle/deploy-bundle.tar.gz -C bundle/root

      - name: Deploy
        env:
          ENV: ${{ matrix.deploy_env }}
          TARGET: ${{ matrix.target_dir }}
        run: |
          cd bundle/root
          echo "Deploying ${{ matrix.name }} to $TARGET..."

          # Self-hosted runners launch non-login shells; nvm-installed node
          # is not on PATH until we source nvm.sh. Without this, the
          # `npm ci --omit=dev` and resvg smoke test below would fail with
          # "command not found" on targets using nvm.
          if ! command -v node >/dev/null 2>&1; then
            if [[ -s "$HOME/.nvm/nvm.sh" ]]; then
              # shellcheck disable=SC1091
              source "$HOME/.nvm/nvm.sh"
            fi
            # Final fallback: a specific nvm-installed binary path.
            if ! command -v node >/dev/null 2>&1; then
              NVM_BIN="$(ls -1d "$HOME"/.nvm/versions/node/v*/bin 2>/dev/null | sort -V | tail -1 || true)"
              if [[ -n "$NVM_BIN" ]]; then
                export PATH="$NVM_BIN:$PATH"
              fi
            fi
            # Fallback for runners where node is installed via Homebrew
            # rather than nvm. Apple Silicon: /opt/homebrew, Intel/Linux: /usr/local.
            if ! command -v node >/dev/null 2>&1; then
              for BREW_PREFIX in /opt/homebrew /usr/local; do
                if [[ -x "$BREW_PREFIX/bin/node" ]]; then
                  export PATH="$BREW_PREFIX/bin:$PATH"
                  break
                fi
              done
            fi
          fi
          command -v node >/dev/null 2>&1 || {
            echo "::error::node not found on PATH after nvm/brew fallbacks — cannot deploy."
            exit 1
          }
          command -v npm >/dev/null 2>&1 || {
            echo "::error::npm not found on PATH after nvm/brew fallbacks — cannot deploy."
            exit 1
          }
          echo "Using node: $(node -v) at $(command -v node)"

          if [[ "$ENV" == "main" ]]; then
            DEV_SOURCE="/opt/soma-work/dev" \
            LEGACY_ROOT="/Users/dd/app.claude-code-slack-bot" \
            TARGET="$TARGET" \
            node dist/deploy/main-env-bootstrap.js
          fi

          bash scripts/service.sh "$ENV" stop || true
          bash scripts/deploy/sync-bundle.sh "$TARGET" "."
          bash scripts/deploy/install-target.sh "$TARGET" "$ENV" "${{ matrix.name }}"

      - name: Verify
        env:
          ENV: ${{ matrix.deploy_env }}
        run: |
          # The Deploy step's `cd bundle/root` does not persist across steps;
          # scripts/service.sh lives at bundle/root/scripts/service.sh after
          # the Extract step. Without this cd the Verify step would fail with
          # "scripts/service.sh: No such file or directory". See PR #960
          # review (P1 finding #2).
          cd bundle/root
          sleep 3
          bash scripts/service.sh "$ENV" status
